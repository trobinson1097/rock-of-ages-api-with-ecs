name: Deploy to ECS

on:
  workflow_dispatch:  # Manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Configure AWS credentials using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2️⃣ Force ECS service to deploy the latest task definition
      - name: Update ECS service
        run: |
          echo "Updating ECS service..."
          aws ecs update-service \
            --cluster rock-of-ages-cluster \
            --service rock-of-ages-api-service \
            --force-new-deployment

      # 3️⃣ Wait until desired number of tasks are running
      - name: Wait for running tasks
        run: |
          echo
